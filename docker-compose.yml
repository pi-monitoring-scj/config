version: '3.8'

services:
  # frontend
  frontend:
    image: node:20-alpine
    container_name: monitoring-frontend
    working_dir: /app
    volumes:
      - ../FRONTEND:/app   # 🟢 내 맥북의 코드를 도커 안으로 실시간 동기화
    command: npm run dev         # 🟢 개발 모드 서버 실행
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # backend
  backend:
    build:
      context: ../MONITORING-SERVER
      dockerfile: Dockerfile
    container_name: monitoring-api
    ports:
      - "8000:8000"
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER_HOST=mosquitto
    restart: always

  # mosquitto
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: mosquitto_broker
    ports:
      - "1883:1883" # MQTT 기본 통신
      - "9001:9001" # 웹소켓 포트 (frontend 연동)
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: always